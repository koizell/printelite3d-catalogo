<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PrintElite3D &mdash; Catalogo</title>
  <meta name="description" content="Impresion 3D, stickers y piezas personalizadas hechas a mano.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Hanken+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="estilos.css">
</head>
<body>

  <header class="top">
    <a class="logo" id="logo" href="#top">
      <span class="logo-mark" aria-hidden="true">P</span>
      <span class="logo-text" id="nombre-negocio">PrintElite3D</span>
    </a>
    <a id="top-ig" class="top-ig" href="https://www.instagram.com/printelite3d" target="_blank" rel="noopener noreferrer">
      <svg class="ig-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <rect x="3" y="3" width="18" height="18" rx="5" ry="5" stroke="currentColor" stroke-width="1.6"/>
        <circle cx="12" cy="12" r="3.6" stroke="currentColor" stroke-width="1.6"/>
        <circle cx="17.2" cy="6.8" r="1.1" fill="currentColor"/>
      </svg>
      <span class="top-ig-label">Instagram</span>
    </a>
  </header>

  <section class="hero" id="top">
    <p class="hero-eyebrow" id="hero-eyebrow">Estudio de impresi&oacute;n 3D</p>
    <h1 class="hero-titulo">Piezas hechas<br>para sorprender.</h1>
    <p class="hero-tagline">Impresi&oacute;n 3D, stickers y creaciones personalizadas &mdash; hechas a mano con cuidado. Escr&iacute;benos y lo hacemos realidad.</p>
    <div class="hero-meta">
      <span id="hero-ciudad" class="hero-dato" hidden></span>
      <span id="hero-telefono" class="hero-dato" hidden></span>
    </div>
  </section>

  <main class="catalogo">
    <div class="catalogo-head">
      <h2 class="catalogo-titulo">Cat&aacute;logo</h2>
      <span class="catalogo-linea" aria-hidden="true"></span>
      <span id="catalogo-conteo" class="catalogo-conteo"></span>
    </div>
    <div id="catalogo-grid" class="grid"></div>
  </main>

  <footer class="footer">
    <div class="footer-inner">
      <div class="footer-marca"><span class="logo-mark" aria-hidden="true">P</span> <span id="footer-nombre">PrintElite3D</span></div>
      <a id="footer-ig" class="footer-ig-link" href="https://www.instagram.com/printelite3d" target="_blank" rel="noopener noreferrer">
        <span id="footer-ig-label">@printelite3d</span>
      </a>
      <p id="footer-leyenda" class="footer-leyenda" hidden></p>
      <p class="footer-copy">&copy; <span id="footer-year"></span> PrintElite3D</p>
    </div>
  </footer>

  <script src="catalogo-datos.js"></script>
  <script src="catalogo.js" defer></script>
</body>
</html>
